<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="style.css"/>
  <title>New Tab</title>
<body>
  <div class="main">
    <div class="title">hello, roman (로만)</div>
    <div class="time" id="time">time in tulsa, ok: --:--:--</div>

    <div class="search-box">
      <form action="https://www.google.com/search" method="GET" target="_blank">
        <input type="text" name="q" placeholder="Search Google..." autocomplete="off">
      </form>
    </div>

    <div class="link-grid">
      <a class="link" href="https://github.com/roman-xo" target="_blank">
        <img src="icons/github.svg" alt="GitHub">
        <span>GitHub</span>
      </a>
      <a class="link" href="https://mail.google.com/" target="_blank">
        <img src="icons/mail.svg" alt="Email">
        <span>Email</span>
      </a>
      <a class="link" href="https://youtube.com" target="_blank">
        <img src="icons/youtube.svg" alt="YouTube">
        <span>YouTube</span>
      </a>
      <a class="link" href="https://chat.openai.com/" target="_blank">
        <img src="icons/chatgpt.svg" alt="ChatGPT">
        <span>ChatGPT</span>
      </a>
    </div>

    <div class="weather-box" id="weather">Loading weather...</div>
  </div>

  <script>
    function updateTime() {
      const now = new Date();
      const options = { timeZone: "America/Chicago", hour12: false };
      const timeString = now.toLocaleTimeString("en-US", options);
      document.getElementById("time").textContent = `time in tulsa, ok: ${timeString}`;
    }
    setInterval(updateTime, 1000);
    updateTime();

    const lat = 36.154, lon = -95.993;
    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weathercode&temperature_unit=fahrenheit`)
      .then(res => res.json())
      .then(data => {
        const temp = Math.round(data.current.temperature_2m);
        const code = data.current.weathercode;
        const codeDescriptions = {
          0: {desc: "Clear sky", icon: "☀️"},
          1: {desc: "Mainly clear", icon: "🌤️"},
          2: {desc: "Partly cloudy", icon: "⛅"},
          3: {desc: "Overcast", icon: "☁️"},
          61: {desc: "Light rain", icon: "🌧️"},
          95: {desc: "Thunderstorm", icon: "⛈️"}
        };
        const weather = codeDescriptions[code] || {desc: "Unknown", icon: "❓"};
        document.getElementById('weather').innerHTML = `${weather.icon} ${temp}°F, ${weather.desc}`;
      })
      .catch(() => {
        document.getElementById('weather').textContent = "Weather info not available.";
      });
  </script>
</body>
